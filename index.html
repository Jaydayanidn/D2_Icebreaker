<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D2 COP — Word Search Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0d12;--surface:#111620;--surface2:#171d2a;--border:#1e2636;--border-hi:#2a3348;
  --text:#d4dae8;--text-dim:#4e5a73;--accent:#4f8ff7;--accent-glow:rgba(79,143,247,0.15);
  --cat-de:#22d3ee;--cat-ai:#a78bfa;--cat-em:#fbbf24;
  --cat-pd:#34d399;--cat-gr:#f87171;--cat-gen:#94a3b8;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(79,143,247,0.06),transparent);pointer-events:none;z-index:0}

/* ── HEADER ── */
.header{position:relative;z-index:1;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;background:var(--surface)}
.header-left{display:flex;align-items:center;gap:0.8rem}
.logo{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.18em;color:var(--accent);text-transform:uppercase;background:var(--accent-glow);padding:0.3rem 0.65rem;border:1px solid rgba(79,143,247,0.2);border-radius:3px;font-weight:600}
.title{font-size:1.25rem;font-weight:700;letter-spacing:-0.03em}
.title span{color:var(--accent)}
.stats{display:flex;gap:1.2rem;align-items:center}
.stat{text-align:center;min-width:48px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:1.15rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin-top:1px}
.divider{color:var(--border-hi);font-size:1.2rem}

/* ── LAYOUT ── */
.app{position:relative;z-index:1;display:flex;gap:0;min-height:calc(100vh - 72px)}
.grid-panel{flex:1;padding:1.2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:auto}
.sidebar{width:300px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden}
.sidebar-scroll{flex:1;overflow-y:auto;padding:1rem}

/* ── GRID ── */
.grid-wrapper{position:relative;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
table.g{border-collapse:collapse;cursor:crosshair}
table.g td{
  width:27px;height:27px;text-align:center;vertical-align:middle;
  font-family:'JetBrains Mono',monospace;font-size:0.7rem;font-weight:600;
  color:var(--text-dim);border:1px solid var(--border);
  transition:background 0.1s,color 0.1s,box-shadow 0.1s;position:relative;
}
table.g td:hover{background:var(--surface2);color:var(--text)}
table.g td.sel{background:rgba(79,143,247,0.18);color:var(--text);box-shadow:inset 0 0 0 1px rgba(79,143,247,0.3)}
table.g td.found{color:#fff !important;font-weight:700;border-color:transparent !important}
table.g td.f-de{background:rgba(34,211,238,0.28) !important}
table.g td.f-ai{background:rgba(167,139,250,0.28) !important}
table.g td.f-em{background:rgba(251,191,36,0.25) !important}
table.g td.f-pd{background:rgba(52,211,153,0.25) !important}
table.g td.f-gr{background:rgba(248,113,113,0.25) !important}
table.g td.f-gen{background:rgba(148,163,184,0.2) !important}

/* ── SIDEBAR ── */
.info-box{font-size:0.72rem;color:var(--text-dim);padding:0.65rem 0.75rem;background:var(--surface2);border-radius:5px;margin-bottom:1rem;line-height:1.55;border:1px solid var(--border)}
.info-box strong{color:var(--text)}
.prog-wrap{margin-bottom:1rem}
.prog-row{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--text-dim);margin-bottom:0.35rem;font-family:'JetBrains Mono',monospace}
.prog-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s ease}

.cat-sec{margin-bottom:1rem}
.cat-hdr{font-size:0.62rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;padding:0.3rem 0.55rem;border-radius:3px;margin-bottom:0.35rem;display:flex;align-items:center;gap:0.4rem}
.cat-hdr .d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.c-de .d{background:var(--cat-de)}.c-de{color:var(--cat-de);background:rgba(34,211,238,0.07)}
.c-ai .d{background:var(--cat-ai)}.c-ai{color:var(--cat-ai);background:rgba(167,139,250,0.07)}
.c-em .d{background:var(--cat-em)}.c-em{color:var(--cat-em);background:rgba(251,191,36,0.07)}
.c-pd .d{background:var(--cat-pd)}.c-pd{color:var(--cat-pd);background:rgba(52,211,153,0.07)}
.c-gr .d{background:var(--cat-gr)}.c-gr{color:var(--cat-gr);background:rgba(248,113,113,0.07)}
.c-gen .d{background:var(--cat-gen)}.c-gen{color:var(--cat-gen);background:rgba(148,163,184,0.07)}

.wrd{
  font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.03em;
  padding:0.22rem 0.45rem;display:inline-block;margin:0.12rem;
  border-radius:3px;background:var(--bg);color:var(--text-dim);
  border:1px solid var(--border);transition:all 0.2s;cursor:default;
}
.wrd:hover:not(.done){border-color:var(--border-hi);color:var(--text)}
.wrd.done{text-decoration:line-through;opacity:0.3;border-color:transparent}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(50px);
  background:var(--surface2);border:1px solid var(--accent);padding:0.5rem 1.1rem;
  border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:0.78rem;
  color:var(--accent);z-index:50;transition:transform 0.25s ease,opacity 0.25s;opacity:0;
  pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── VICTORY ── */
.victory{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.5s}
.victory.show{opacity:1;pointer-events:all}
.v-card{background:var(--surface);border:1px solid var(--border-hi);border-radius:10px;padding:2.5rem 3rem;text-align:center;max-width:400px}
.v-card h2{font-size:1.6rem;font-weight:700;margin-bottom:0.4rem}
.v-card h2 span{color:var(--accent)}
.v-card p{color:var(--text-dim);font-size:0.85rem;margin-bottom:1.2rem}
.v-time{font-family:'JetBrains Mono',monospace;font-size:2.2rem;color:var(--accent);font-weight:700}
.v-btn{
  font-family:'IBM Plex Sans',sans-serif;font-size:0.82rem;font-weight:600;
  padding:0.55rem 1.4rem;border:1px solid var(--accent);background:transparent;
  color:var(--accent);border-radius:5px;cursor:pointer;transition:all 0.2s;margin-top:1.2rem;
}
.v-btn:hover{background:var(--accent);color:#fff}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  .app{flex-direction:column}
  .sidebar{width:100%;border-left:none;border-top:1px solid var(--border);max-height:42vh}
  table.g td{width:23px;height:23px;font-size:0.6rem}
}
@media(max-width:600px){
  table.g td{width:15px;height:15px;font-size:0.42rem}
  .header{padding:0.8rem 1rem}
  .title{font-size:1rem}
  .stats{gap:0.6rem}
  .stat-val{font-size:0.9rem}
}
</style>
</head>

{w:"DEVOPS",c:[[18,8],[18,9],[18,10],[18,11],[18,12],[18,13]]},
{w:"IMPACT",c:[[12,7],[12,8],[12,9],[12,10],[12,11],[12,12]]},
{w:"INTAKE",c:[[14,15],[14,16],[14,17],[14,18],[14,19],[14,20]]},
{w:"METRIC",c:[[17,0],[18,0],[19,0],[20,0],[21,0],[22,0]]},
{w:"SCHEMA",c:[[18,1],[19,1],[20,1],[21,1],[22,1],[23,1]]},
{w:"TARGET",c:[[9,10],[9,9],[9,8],[9,7],[9,6],[9,5]]},
{w:"AGENT",c:[[17,7],[18,7],[19,7],[20,7],[21,7]]},
{w:"AZURE",c:[[20,10],[20,11],[20,12],[20,13],[20,14]]},
{w:"DRIFT",c:[[13,9],[13,10],[13,11],[13,12],[13,13]]},
{w:"BIAS",c:[[20,8],[21,8],[22,8],[23,8]]},
{w:"RISK",c:[[4,21],[5,21],[6,21],[7,21]]},
{w:"API",c:[[5,5],[6,5],[7,5]]},
{w:"GIT",c:[[5,10],[5,11],[5,12]]}
];

const TOTAL=W.length;
W.forEach(wd=>{wd.cat=CM[wd.w]||"gen";CATS[wd.cat].w.push(wd.w)});

let found=new Set(),t0=Date.now(),tmr;
const cells=[];

// Build grid
const gt=document.getElementById("gt");
for(let r=0;r<24;r++){const tr=document.createElement("tr");cells[r]=[];for(let c=0;c<24;c++){const td=document.createElement("td");td.textContent=G[r][c];td.dataset.r=r;td.dataset.c=c;cells[r][c]=td;tr.appendChild(td)}gt.appendChild(tr)}

// Build word list
const wl=document.getElementById("wl"),we={};
for(const[k,cat]of Object.entries(CATS)){
  if(!cat.w.length)continue;
  const s=document.createElement("div");s.className="cat-sec";
  const h=document.createElement("div");h.className="cat-hdr "+cat.c;
  h.innerHTML=`<span class="d"></span>${cat.l} <span style="opacity:0.5;margin-left:auto">${cat.w.length}</span>`;
  s.appendChild(h);
  const d=document.createElement("div");
  cat.w.sort().forEach(w=>{const sp=document.createElement("span");sp.className="wrd";sp.textContent=w;sp.id="w-"+w;we[w]=sp;d.appendChild(sp)});
  s.appendChild(d);wl.appendChild(s);
}

// Timer
function tick(){const e=Math.floor((Date.now()-t0)/1000);document.getElementById("tm").textContent=String(Math.floor(e/60)).padStart(2,"0")+":"+String(e%60).padStart(2,"0")}
tmr=setInterval(tick,1000);

// Selection
let ing=false,start=null,sc=[];
function clr(){sc.forEach(([r,c])=>cells[r][c].classList.remove("sel"));sc=[];}

function line(r1,c1,r2,c2){
  const res=[];
  if(r1===r2){const a=Math.min(c1,c2),b=Math.max(c1,c2);for(let c=a;c<=b;c++)res.push([r1,c])}
  else if(c1===c2){const a=Math.min(r1,r2),b=Math.max(r1,r2);for(let r=a;r<=b;r++)res.push([r,c1])}
  return res;
}

function hilite(r2,c2){
  clr();if(!start)return;
  const[r1,c1]=start;
  let er=r2,ec=c2;
  const dr=Math.abs(r2-r1),dc=Math.abs(c2-c1);
  if(dr!==0&&dc!==0){dc>dr?er=r1:ec=c1}
  sc=line(r1,c1,er,ec);
  sc.forEach(([r,c])=>cells[r][c].classList.add("sel"));
}

function check(){
  if(sc.length<2)return;
  for(const wd of W){
    if(found.has(wd.w)||wd.c.length!==sc.length)continue;
    let mf=true,mr=true;
    for(let i=0;i<wd.c.length;i++){
      if(wd.c[i][0]!==sc[i][0]||wd.c[i][1]!==sc[i][1])mf=false;
      if(wd.c[i][0]!==sc[sc.length-1-i][0]||wd.c[i][1]!==sc[sc.length-1-i][1])mr=false;
    }
    if(mf||mr){hit(wd);return}
  }
}

function hit(wd){
  found.add(wd.w);
  const fc=CATS[wd.cat].f;
  wd.c.forEach(([r,c])=>cells[r][c].classList.add("found",fc));
  if(we[wd.w])we[wd.w].classList.add("done");
  toast("✓ "+wd.w);prog();
  if(found.size===TOTAL){clearInterval(tmr);tick();document.getElementById("vt").textContent=document.getElementById("tm").textContent;setTimeout(()=>document.getElementById("vic").classList.add("show"),500)}
}

function prog(){
  const n=found.size;
  document.getElementById("fc").textContent=n;
  document.getElementById("pt").textContent=n+" / "+TOTAL;
  const p=Math.round(n/TOTAL*100);
  document.getElementById("pp").textContent=p+"%";
  document.getElementById("pf").style.width=p+"%";
}

function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1400)}

function rc(e){const t=e.touches?e.touches[0]:e;const el=document.elementFromPoint(t.clientX,t.clientY);if(!el||!el.dataset.r)return null;return[+el.dataset.r,+el.dataset.c]}

gt.addEventListener("mousedown",e=>{const p=rc(e);if(!p)return;ing=true;start=p;hilite(p[0],p[1]);e.preventDefault()});
gt.addEventListener("mousemove",e=>{if(!ing)return;const p=rc(e);if(p)hilite(p[0],p[1])});
document.addEventListener("mouseup",()=>{if(!ing)return;ing=false;check();clr();start=null});
gt.addEventListener("touchstart",e=>{const p=rc(e);if(!p)return;ing=true;start=p;hilite(p[0],p[1]);e.preventDefault()},{passive:false});
gt.addEventListener("touchmove",e=>{if(!ing)return;const p=rc(e);if(p)hilite(p[0],p[1]);e.preventDefault()},{passive:false});
document.addEventListener("touchend",()=>{if(!ing)return;ing=false;check();clr();start=null});

prog();
</script>
</body>
</html>
